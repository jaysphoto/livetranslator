name: Docker Image

on:
  push:
    branches:
     - main

jobs:
  docker:
    if: ${{ (vars.DOCKERHUB_USERNAME || false) }}
    runs-on: ubuntu-latest
    env:
      IMAGE: ${{ vars.DOCKERHUB_USERNAME }}/livetranslator

    strategy:
      matrix:
        include:
          - dockerfile: ./Dockerfile
            imagetag:
          - dockerfile: ./Dockerfile.alpine
            imagetag: -alpine
    steps:
      -
        name: Checkout
        uses: actions/checkout@v6
      -
        name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      -
        name: Build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          build-args: |
              BUNDLER_WITH=production
          push: false
          platforms: linux/amd64
          tags: ${{ env.IMAGE }}:test${{ matrix.imagetag }}
      -
        name: Docker Scout
        id: docker-scout
        uses: docker/scout-action@v1
        with:
          command: quickview,compare
          image: ${{ env.IMAGE }}:latest${{ matrix.imagetag }}
          organization: ${{ vars.DOCKERHUB_USERNAME }}
          to-latest: true
          ignore-base: true
          ignore-unchanged: true
          only-severities: critical,high
      -
        name: Push
        uses: docker/build-push-action@v7
        if: ${{ (vars.DOCKERHUB_PUSH_IMAGE || false) }}
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          build-args: |
              BUNDLER_WITH=production
          push: true
          platforms: linux/amd64
          tags: ${{ env.IMAGE }}:latest${{ matrix.imagetag }}
